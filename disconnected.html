<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QuickBooks Disconnected - OpenClaw</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .disconnect-icon {
            width: 80px;
            height: 80px;
            background: #e74c3c;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .disconnect-text {
            color: #e74c3c;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .info-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #0077c5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="disconnect-icon">✕</div>
        <h1>QuickBooks Disconnected</h1>
        <p class="disconnect-text">Your QuickBooks connection has been removed</p>
        
        <div class="info-box">
            <p style="font-size: 14px; color: #495057; line-height: 1.6;">
                OpenClaw no longer has access to your QuickBooks data. 
                To reconnect, use the Connect button in Teams.
            </p>
        </div>
        
        <a href="connect.html" class="btn">Reconnect QuickBooks</a>
    </div>
</body>
</html>
