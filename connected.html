<!DOCTYPE html>
<html>
<head>
    <title>QuickBooks Connected - OpenClaw</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .success { color: #28a745; font-size: 48px; text-align: center; }
        .code-box { background: #f5f5f5; padding: 15px; border-radius: 5px; word-break: break-all; font-family: monospace; margin: 10px 0; }
        .hidden { display: none; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="success">✓</div>
    <h2>Successfully Connected!</h2>
    <p>OpenClaw can now access your QuickBooks data.</p>
    
    <div id="token-section">
        <h3>Copy this code and paste it in your chat:</h3>
        <div class="code-box" id="code-display"></div>
        <button onclick="copyCode()">Copy to Clipboard</button>
        <p id="copy-status"></p>
        
        <h4>Company ID (Realm ID):</h4>
        <div class="code-box" id="realm-display"></div>
    </div>
    
    <div id="error-section" class="hidden">
        <p style="color: red;">Error: No authorization code found. Please try again.</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const realmId = params.get('realmId');
        
        if (code) {
            document.getElementById('code-display').textContent = code;
            document.getElementById('realm-display').textContent = realmId || 'Not provided';
        } else {
            document.getElementById('token-section').classList.add('hidden');
            document.getElementById('error-section').classList.remove('hidden');
        }
        
        function copyCode() {
            navigator.clipboard.writeText(code).then(() => {
                document.getElementById('copy-status').textContent = 'Copied!';
            });
        }
    </script>
</body>
</html>
